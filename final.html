<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Summary</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        .wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #fff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
            max-width: 640px;
            width: 90%;
            text-align: center;
        }

        h1 {
            color: #28a745;
            font-size: 36px;
            margin: 0 0 10px;
        }

        p {
            font-size: 20px;
            margin: 8px 0;
        }

        .total {
            font-size: 28px;
            font-weight: 700;
            color: #28a745;
            margin-top: 12px;
        }

        .btn {
            margin-top: 18px;
            padding: 10px 18px;
            background: #28a745;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="card">
            <h1>💰 Loan Summary 💰</h1>
            <div id="summary">
                <p>Loading...</p>
            </div>
            <button class="btn" onclick="goBack()">Back</button>
        </div>
    </div>

    <script>
        function formatKES(n) {
            return 'KES ' + Number(n).toLocaleString();
        }

        function goBack() {
            window.history.back();
        }

        const params = new URLSearchParams(window.location.search);
        const amount = parseFloat(params.get('amount')) || 0;

        if (amount <= 0) {
            document.getElementById('summary').innerHTML = '<p>Please provide a valid amount.</p>';
        } else {
            const interest = amount * 0.10;
            const total = amount + interest;

            document.getElementById('summary').innerHTML = `
                <p>You have lent: <strong>${formatKES(amount)}</strong></p>
                <p>Interest (10%): <strong>${formatKES(interest)}</strong></p>
                <hr>
                <p class="total">Total Repayment: ${formatKES(total)}</p>
            `;
        }
    </script>
</body>

</html>
