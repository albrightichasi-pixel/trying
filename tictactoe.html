<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>

    <style>
        :root {
            --bg: #111315;
            --panel: #1c2126;
            --cell: #252c33;
            --cell-hover: #303943;
            --text: #f5f8fa;
            --muted: #a9b4bc;
            --accent: #35d07f;
            --x: #61a8ff;
            --o: #ffbf5f;
            --line: #35404a;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 22px;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(53, 208, 127, 0.14), transparent 32rem),
                linear-gradient(135deg, #101214 0%, var(--bg) 58%, #171b20 100%);
        }

        main {
            width: min(100%, 460px);
            text-align: center;
        }

        nav {
            margin-bottom: 18px;
            text-align: left;
        }

        nav a {
            color: var(--muted);
            text-decoration: none;
            font-weight: 700;
        }

        nav a:hover {
            color: var(--accent);
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 8vw, 3.4rem);
            letter-spacing: 0;
        }

        #status {
            min-height: 32px;
            margin: 14px 0 20px;
            color: var(--muted);
            font-size: 1.15rem;
            font-weight: 700;
        }

        .board {
            width: min(100%, 390px);
            aspect-ratio: 1;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .cell {
            display: grid;
            place-items: center;
            min-width: 0;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--cell);
            color: var(--text);
            font-size: clamp(2.7rem, 15vw, 5rem);
            font-weight: 900;
            cursor: pointer;
            transition: background 180ms ease, transform 180ms ease, border-color 180ms ease;
        }

        .cell:hover {
            background: var(--cell-hover);
            transform: translateY(-1px);
        }

        .cell.x {
            color: var(--x);
        }

        .cell.o {
            color: var(--o);
        }

        .cell.win {
            border-color: var(--accent);
            background: rgba(53, 208, 127, 0.16);
        }

        .actions {
            margin-top: 22px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            min-height: 46px;
            padding: 0 22px;
            border: 0;
            border-radius: 8px;
            background: var(--accent);
            color: #09120d;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
        }

        button:hover {
            background: #26b86c;
        }
    </style>
</head>

<body>
    <main>
        <nav>
            <a href="games.html">Back to games</a>
        </nav>

        <h1>Tic Tac Toe</h1>
        <div id="status">Player X's turn</div>

        <section class="board" id="board" aria-label="Tic Tac Toe board">
            <button class="cell" data-index="0" type="button" aria-label="Cell 1"></button>
            <button class="cell" data-index="1" type="button" aria-label="Cell 2"></button>
            <button class="cell" data-index="2" type="button" aria-label="Cell 3"></button>
            <button class="cell" data-index="3" type="button" aria-label="Cell 4"></button>
            <button class="cell" data-index="4" type="button" aria-label="Cell 5"></button>
            <button class="cell" data-index="5" type="button" aria-label="Cell 6"></button>
            <button class="cell" data-index="6" type="button" aria-label="Cell 7"></button>
            <button class="cell" data-index="7" type="button" aria-label="Cell 8"></button>
            <button class="cell" data-index="8" type="button" aria-label="Cell 9"></button>
        </section>

        <div class="actions">
            <button id="restartBtn" type="button">Restart Game</button>
        </div>
    </main>

    <script>
        const cells = document.querySelectorAll(".cell");
        const statusText = document.getElementById("status");
        const restartBtn = document.getElementById("restartBtn");

        let board = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X";
        let gameActive = true;

        const winPatterns = [
            [0, 1, 2],
            [3, 4, 5],
            [6, 7, 8],
            [0, 3, 6],
            [1, 4, 7],
            [2, 5, 8],
            [0, 4, 8],
            [2, 4, 6]
        ];

        cells.forEach((cell) => {
            cell.addEventListener("click", handleCellClick);
        });

        restartBtn.addEventListener("click", restartGame);

        function handleCellClick() {
            const index = Number(this.dataset.index);

            if (board[index] || !gameActive) {
                return;
            }

            board[index] = currentPlayer;
            this.textContent = currentPlayer;
            this.classList.add(currentPlayer.toLowerCase());

            checkGameState();
        }

        function checkGameState() {
            const winningPattern = winPatterns.find((pattern) => {
                const [a, b, c] = pattern;
                return board[a] && board[a] === board[b] && board[b] === board[c];
            });

            if (winningPattern) {
                winningPattern.forEach((index) => cells[index].classList.add("win"));
                statusText.textContent = `Player ${currentPlayer} wins`;
                gameActive = false;
                return;
            }

            if (!board.includes("")) {
                statusText.textContent = "It is a draw";
                gameActive = false;
                return;
            }

            currentPlayer = currentPlayer === "X" ? "O" : "X";
            statusText.textContent = `Player ${currentPlayer}'s turn`;
        }

        function restartGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            currentPlayer = "X";
            gameActive = true;
            statusText.textContent = "Player X's turn";

            cells.forEach((cell) => {
                cell.textContent = "";
                cell.classList.remove("x", "o", "win");
            });
        }
    </script>
</body>

</html>
