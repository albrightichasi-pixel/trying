<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Hub</title>

    <style>
        :root {
            --bg: #111315;
            --panel: #1c2126;
            --panel-2: #232a30;
            --text: #f4f7f8;
            --muted: #a9b4bc;
            --accent: #35d07f;
            --accent-dark: #1fa160;
            --line: #313941;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(53, 208, 127, 0.16), transparent 32rem),
                linear-gradient(135deg, #101214 0%, var(--bg) 55%, #161a1e 100%);
        }

        header {
            width: min(100% - 32px, 1080px);
            margin: 0 auto;
            padding: 38px 0 24px;
        }

        h1 {
            margin: 0;
            font-size: clamp(2.1rem, 7vw, 4rem);
            letter-spacing: 0;
        }

        header p {
            margin: 10px 0 0;
            color: var(--muted);
            font-size: 1.05rem;
        }

        .games {
            width: min(100% - 32px, 1080px);
            margin: 0 auto;
            padding: 16px 0 44px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 18px;
        }

        .game {
            min-height: 360px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 18px 42px rgba(0, 0, 0, 0.24);
        }

        .preview {
            min-height: 190px;
            display: grid;
            place-items: center;
            background: var(--panel-2);
            border-bottom: 1px solid var(--line);
        }

        .snake-preview {
            width: 180px;
            height: 180px;
            position: relative;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 5px;
            padding: 10px;
            background: #151a18;
            border: 2px solid var(--accent);
            border-radius: 8px;
        }

        .snake-preview span {
            border-radius: 4px;
            background: #2e373d;
        }

        .snake-preview .snake {
            background: var(--accent);
        }

        .snake-preview .food {
            background: #ff5c5c;
            border-radius: 50%;
        }

        .tic-preview {
            width: 180px;
            height: 180px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 7px;
        }

        .tic-preview span {
            display: grid;
            place-items: center;
            background: #15191d;
            border: 1px solid #3a444d;
            border-radius: 8px;
            color: var(--accent);
            font-size: 2.4rem;
            font-weight: 800;
        }

        .game-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .game h2 {
            margin: 0;
            font-size: 1.45rem;
        }

        .game p {
            margin: 10px 0 24px;
            color: var(--muted);
            line-height: 1.5;
        }

        .game a {
            margin-top: auto;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 46px;
            padding: 0 18px;
            border-radius: 8px;
            color: #09120d;
            background: var(--accent);
            font-weight: 800;
            text-decoration: none;
            transition: background 180ms ease, transform 180ms ease;
        }

        .game a:hover {
            background: var(--accent-dark);
            transform: translateY(-1px);
        }

        @media (max-width: 560px) {
            header {
                padding-top: 28px;
            }

            .games {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <header>
        <h1>Game Hub</h1>
        <p>Select a game and start playing.</p>
    </header>

    <main class="games">
        <article class="game">
            <div class="preview" aria-hidden="true">
                <div class="snake-preview">
                    <span></span><span></span><span></span><span></span><span class="food"></span><span></span>
                    <span></span><span></span><span></span><span></span><span></span><span></span>
                    <span></span><span class="snake"></span><span class="snake"></span><span class="snake"></span><span></span><span></span>
                    <span></span><span></span><span></span><span class="snake"></span><span></span><span></span>
                    <span></span><span></span><span></span><span class="snake"></span><span></span><span></span>
                    <span></span><span></span><span></span><span></span><span></span><span></span>
                </div>
            </div>
            <div class="game-content">
                <h2>Snake</h2>
                <p>Eat food, grow longer, and avoid crashing into the wall or yourself.</p>
                <a href="snake.html">Play Snake</a>
            </div>
        </article>

        <article class="game">
            <div class="preview" aria-hidden="true">
                <div class="tic-preview">
                    <span>X</span><span>O</span><span>X</span>
                    <span></span><span>X</span><span>O</span>
                    <span>O</span><span></span><span>X</span>
                </div>
            </div>
            <div class="game-content">
                <h2>Tic Tac Toe</h2>
                <p>Take turns with a friend and line up three marks to win.</p>
                <a href="tictactoe.html">Play Tic Tac Toe</a>
            </div>
        </article>
    </main>
</body>

</html>
