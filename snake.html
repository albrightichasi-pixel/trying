<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>

    <style>
        :root {
            --bg: #111315;
            --panel: #1c2126;
            --text: #f5f8fa;
            --muted: #a9b4bc;
            --accent: #35d07f;
            --accent-dark: #26b86c;
            --food: #ff5c5c;
            --line: #35404a;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(53, 208, 127, 0.14), transparent 32rem),
                linear-gradient(135deg, #101214 0%, var(--bg) 58%, #171b20 100%);
        }

        main {
            width: min(100%, 520px);
            text-align: center;
        }

        nav {
            margin-bottom: 18px;
            text-align: left;
        }

        nav a {
            color: var(--muted);
            text-decoration: none;
            font-weight: 700;
        }

        nav a:hover {
            color: var(--accent);
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 8vw, 3.4rem);
            letter-spacing: 0;
        }

        .score-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin: 14px auto 18px;
            color: var(--muted);
            font-weight: 800;
        }

        canvas {
            width: min(100%, 420px);
            aspect-ratio: 1;
            height: auto;
            display: block;
            margin: 0 auto;
            background: #15191d;
            border: 2px solid var(--accent);
            border-radius: 8px;
            box-shadow: 0 18px 42px rgba(0, 0, 0, 0.26);
        }

        .actions {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            min-height: 46px;
            padding: 0 20px;
            border: 0;
            border-radius: 8px;
            background: var(--accent);
            color: #09120d;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
        }

        button:hover {
            background: var(--accent-dark);
        }

        .hint {
            margin: 14px auto 0;
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.45;
        }
    </style>
</head>

<body>
    <main>
        <nav>
            <a href="games.html">Back to games</a>
        </nav>

        <h1>Snake</h1>

        <div class="score-row">
            <span id="score">Score: 0</span>
            <span id="status">Use arrow keys</span>
        </div>

        <canvas id="game" width="400" height="400" aria-label="Snake game board"></canvas>

        <div class="actions">
            <button id="restartBtn" type="button">Restart Game</button>
        </div>

        <p class="hint">Use the arrow keys to move. On touch screens, swipe on the board.</p>
    </main>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const scoreText = document.getElementById("score");
        const statusText = document.getElementById("status");
        const restartBtn = document.getElementById("restartBtn");

        const tileSize = 20;
        const tileCount = canvas.width / tileSize;
        let snake;
        let direction;
        let nextDirection;
        let food;
        let score;
        let gameTimer;
        let gameOver;
        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener("keydown", handleKeyPress);
        canvas.addEventListener("touchstart", handleTouchStart, { passive: true });
        canvas.addEventListener("touchend", handleTouchEnd, { passive: true });
        restartBtn.addEventListener("click", startGame);

        startGame();

        function startGame() {
            snake = [{ x: 10, y: 10 }];
            direction = "RIGHT";
            nextDirection = "RIGHT";
            score = 0;
            gameOver = false;
            scoreText.textContent = "Score: 0";
            statusText.textContent = "Use arrow keys";
            placeFood();
            clearInterval(gameTimer);
            gameTimer = setInterval(updateGame, 120);
            drawGame();
        }

        function handleKeyPress(event) {
            const keyDirections = {
                ArrowLeft: "LEFT",
                ArrowUp: "UP",
                ArrowRight: "RIGHT",
                ArrowDown: "DOWN"
            };

            const requestedDirection = keyDirections[event.key];

            if (requestedDirection) {
                event.preventDefault();
                changeDirection(requestedDirection);
            }
        }

        function handleTouchStart(event) {
            const touch = event.changedTouches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
        }

        function handleTouchEnd(event) {
            const touch = event.changedTouches[0];
            const deltaX = touch.clientX - touchStartX;
            const deltaY = touch.clientY - touchStartY;

            if (Math.max(Math.abs(deltaX), Math.abs(deltaY)) < 24) {
                return;
            }

            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                changeDirection(deltaX > 0 ? "RIGHT" : "LEFT");
            } else {
                changeDirection(deltaY > 0 ? "DOWN" : "UP");
            }
        }

        function changeDirection(requestedDirection) {
            const opposites = {
                LEFT: "RIGHT",
                RIGHT: "LEFT",
                UP: "DOWN",
                DOWN: "UP"
            };

            if (requestedDirection !== opposites[direction]) {
                nextDirection = requestedDirection;
            }
        }

        function updateGame() {
            if (gameOver) {
                return;
            }

            direction = nextDirection;

            const head = { ...snake[0] };

            if (direction === "LEFT") head.x -= 1;
            if (direction === "RIGHT") head.x += 1;
            if (direction === "UP") head.y -= 1;
            if (direction === "DOWN") head.y += 1;

            const willEatFood = head.x === food.x && head.y === food.y;
            const bodyToCheck = willEatFood ? snake : snake.slice(0, -1);

            if (hasHitWall(head) || hasHitSnake(head, bodyToCheck)) {
                endGame();
                return;
            }

            snake.unshift(head);

            if (willEatFood) {
                score += 1;
                scoreText.textContent = `Score: ${score}`;
                placeFood();
            } else {
                snake.pop();
            }

            drawGame();
        }

        function drawGame() {
            ctx.fillStyle = "#15191d";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawGrid();

            ctx.fillStyle = "#ff5c5c";
            ctx.beginPath();
            ctx.arc(food.x * tileSize + tileSize / 2, food.y * tileSize + tileSize / 2, tileSize * 0.38, 0, Math.PI * 2);
            ctx.fill();

            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? "#35d07f" : "#1fa160";
                ctx.fillRect(segment.x * tileSize + 1, segment.y * tileSize + 1, tileSize - 2, tileSize - 2);
            });
        }

        function drawGrid() {
            ctx.strokeStyle = "#20272d";
            ctx.lineWidth = 1;

            for (let i = 0; i <= tileCount; i += 1) {
                const position = i * tileSize;
                ctx.beginPath();
                ctx.moveTo(position, 0);
                ctx.lineTo(position, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, position);
                ctx.lineTo(canvas.width, position);
                ctx.stroke();
            }
        }

        function placeFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some((segment) => segment.x === food.x && segment.y === food.y));
        }

        function hasHitWall(head) {
            return head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount;
        }

        function hasHitSnake(head, body) {
            return body.some((segment) => segment.x === head.x && segment.y === head.y);
        }

        function endGame() {
            gameOver = true;
            clearInterval(gameTimer);
            statusText.textContent = "Game over";
        }
    </script>
</body>

</html>
