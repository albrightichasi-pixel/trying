<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Shootout</title>

    <style>
        :root {
            --bg: #111315;
            --text: #f5f8fa;
            --muted: #a9b4bc;
            --accent: #ff9f43;
            --accent-dark: #e87f18;
            --line: #35404a;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(255, 159, 67, 0.18), transparent 32rem),
                linear-gradient(135deg, #101214 0%, var(--bg) 58%, #171b20 100%);
        }

        main {
            width: min(100%, 720px);
            text-align: center;
        }

        nav {
            margin-bottom: 18px;
            text-align: left;
        }

        nav a {
            color: var(--muted);
            text-decoration: none;
            font-weight: 700;
        }

        nav a:hover {
            color: var(--accent);
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 8vw, 3.4rem);
            letter-spacing: 0;
        }

        .score-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin: 14px auto 18px;
            color: var(--muted);
            font-weight: 800;
        }

        canvas {
            width: min(100%, 620px);
            aspect-ratio: 6 / 5;
            height: auto;
            display: block;
            margin: 0 auto;
            background: #9ed9ff;
            border: 2px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 18px 42px rgba(0, 0, 0, 0.26);
            touch-action: manipulation;
        }

        .actions {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            min-height: 46px;
            padding: 0 20px;
            border: 0;
            border-radius: 8px;
            background: var(--accent);
            color: #170b02;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
        }

        button:hover {
            background: var(--accent-dark);
        }

        .hint {
            margin: 14px auto 0;
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.45;
        }
    </style>
</head>

<body>
    <main>
        <nav>
            <a href="games.html">Back to games</a>
        </nav>

        <h1>Basketball Shootout</h1>

        <div class="score-row">
            <span id="score">Score: 0</span>
            <span id="status">Move and shoot</span>
        </div>

        <canvas id="game" width="600" height="500" aria-label="Basketball shootout game"></canvas>

        <div class="actions">
            <button id="leftBtn" type="button">Left</button>
            <button id="shootBtn" type="button">Shoot</button>
            <button id="rightBtn" type="button">Right</button>
            <button id="restartBtn" type="button">Restart Game</button>
        </div>

        <p class="hint">Use left and right arrows to move. Press space or tap Shoot to throw.</p>
    </main>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const scoreText = document.getElementById("score");
        const statusText = document.getElementById("status");
        const leftBtn = document.getElementById("leftBtn");
        const rightBtn = document.getElementById("rightBtn");
        const shootBtn = document.getElementById("shootBtn");
        const restartBtn = document.getElementById("restartBtn");

        const keys = {};
        const hoop = {
            x: 250,
            y: 82,
            width: 100,
            height: 12
        };

        let score = 0;
        let ball;
        let animationFrame;

        document.addEventListener("keydown", (event) => {
            keys[event.code] = true;

            if (event.code === "Space") {
                event.preventDefault();
                shootBall();
            }
        });

        document.addEventListener("keyup", (event) => {
            keys[event.code] = false;
        });

        leftBtn.addEventListener("click", () => moveBall(-38));
        rightBtn.addEventListener("click", () => moveBall(38));
        shootBtn.addEventListener("click", shootBall);
        restartBtn.addEventListener("click", startGame);

        startGame();

        function startGame() {
            score = 0;
            scoreText.textContent = "Score: 0";
            statusText.textContent = "Move and shoot";
            resetBall();
            cancelAnimationFrame(animationFrame);
            updateGame();
        }

        function resetBall() {
            ball = {
                x: 300,
                y: 430,
                radius: 15,
                dx: 0,
                dy: 0,
                shooting: false,
                scored: false
            };
        }

        function moveBall(amount) {
            if (ball.shooting) {
                return;
            }

            ball.x = Math.max(24, Math.min(canvas.width - 24, ball.x + amount));
        }

        function shootBall() {
            if (ball.shooting) {
                return;
            }

            ball.shooting = true;
            ball.dx = (hoop.x + hoop.width / 2 - ball.x) / 72;
            ball.dy = -9.4;
            statusText.textContent = "Shot in the air";
        }

        function updateGame() {
            if (!ball.shooting) {
                if (keys.ArrowLeft) moveBall(-5.5);
                if (keys.ArrowRight) moveBall(5.5);
            } else {
                ball.x += ball.dx;
                ball.y += ball.dy;
                ball.dy += 0.24;

                if (!ball.scored && ballIsInsideHoop()) {
                    ball.scored = true;
                    score += 1;
                    scoreText.textContent = `Score: ${score}`;
                    statusText.textContent = "Nice shot";
                    setTimeout(resetBall, 260);
                }

                if (ball.y - ball.radius > canvas.height || ball.x < -30 || ball.x > canvas.width + 30) {
                    statusText.textContent = "Missed shot";
                    resetBall();
                }
            }

            drawGame();
            animationFrame = requestAnimationFrame(updateGame);
        }

        function ballIsInsideHoop() {
            const ballBottom = ball.y + ball.radius;
            return (
                ball.x > hoop.x + 8 &&
                ball.x < hoop.x + hoop.width - 8 &&
                ballBottom > hoop.y &&
                ballBottom < hoop.y + 20 &&
                ball.dy > 0
            );
        }

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawSky();
            drawCourt();
            drawHoop();
            drawBall();
        }

        function drawSky() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, "#8ed3ff");
            gradient.addColorStop(1, "#d9f0ff");
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawCourt() {
            ctx.fillStyle = "#c97837";
            ctx.fillRect(0, 450, canvas.width, 50);

            ctx.strokeStyle = "rgba(255, 255, 255, 0.75)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(300, 520, 120, Math.PI, Math.PI * 2);
            ctx.stroke();
        }

        function drawHoop() {
            ctx.fillStyle = "#f8fbff";
            ctx.fillRect(222, 38, 156, 14);

            ctx.strokeStyle = "#d94532";
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.moveTo(hoop.x, hoop.y);
            ctx.lineTo(hoop.x + hoop.width, hoop.y);
            ctx.stroke();

            ctx.strokeStyle = "rgba(255, 255, 255, 0.92)";
            ctx.lineWidth = 2;
            for (let i = 0; i <= 5; i += 1) {
                const netX = hoop.x + i * 20;
                ctx.beginPath();
                ctx.moveTo(netX, hoop.y + 6);
                ctx.lineTo(hoop.x + hoop.width / 2, hoop.y + 48);
                ctx.stroke();
            }
        }

        function drawBall() {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = "#f28b2e";
            ctx.fill();
            ctx.strokeStyle = "#43200a";
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.strokeStyle = "#43200a";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(ball.x - ball.radius, ball.y);
            ctx.lineTo(ball.x + ball.radius, ball.y);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius * 0.65, Math.PI / 2, Math.PI * 1.5);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius * 0.65, -Math.PI / 2, Math.PI / 2);
            ctx.stroke();
        }
    </script>
</body>

</html>
