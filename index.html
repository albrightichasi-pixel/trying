<body>

    <div class="container">

        <h1>💰 PLEASE HELP ME WITH CASH 💰</h1>

        <p>
            Hello! I kindly request your support.<br>
            Would you be willing to lend me some money?
        </p>

        <img src="https://placehold.co/600x300/png?text=Please+Help+Me" alt="Proposal">

        <div class="button-container">
            <button id="yesBtn">Yes</button>
            <button id="noBtn">No</button>
        </div>

    </div>

    <script>

        const yesBtn = document.getElementById("yesBtn");
        const noBtn = document.getElementById("noBtn");

        let scale = 1;

        // Initialize No button position at center
        function initializeNoButton() {
            const container = document.querySelector(".button-container");
            const rect = container.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            noBtn.style.position = "fixed";
            noBtn.style.left = (centerX - noBtn.offsetWidth / 2) + "px";
            noBtn.style.top = (centerY - noBtn.offsetHeight / 2) + "px";
        }

        function moveButton() {

            const maxX = window.innerWidth - noBtn.offsetWidth;
            const maxY = window.innerHeight - noBtn.offsetHeight;

            const x = Math.random() * maxX;
            const y = Math.random() * maxY;

            noBtn.style.left = x + "px";
            noBtn.style.top = y + "px";

            scale += 0.2;
            yesBtn.style.transform = `scale(${scale})`;
        }

        initializeNoButton();
        noBtn.addEventListener("mouseenter", moveButton);

        yesBtn.addEventListener("click", () => {

            document.body.innerHTML = `

    ">

    <h2>Enter Amount You Wish To Lend</h2>

    placeholder="Enter amount in KES"

    <button

    style="

    height:auto;
    padding:15px 30px;
    border-radius:10px;
    background:#28a745;
    color:white;
    font-size:20px;
    ">
    ENTER
    </button>

</div>

<script>

function goToFinalPage(){

    const amount =
    parseFloat(document.getElementById('loanAmount').value);

    if(!amount || amount <= 0){
        alert('Please enter a valid amount.');
        return;
    }

    const interest = amount * 0.10;
    const total = amount + interest;

    document.body.innerHTML = \`

    <div style="
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;

    padding:20px;
    ">

        ">

        <div style="

        max-width:600px;
        ">

            <p style="font-size:28px;">
            You have lent:
            <strong>KES \${amount.toLocaleString()}</strong>
            </p>

            <p style="font-size:24px;">
            Interest (10% per year):
            <strong>KES \${interest.toLocaleString()}</strong>
            </p>

            <hr>

            <p style="
            font-size:32px;
            color:#28a745;
            font-weight:bold;
            ">
            Total Repayment:
            KES \${total.toLocaleString()}
            </p>

        </div>

        <p style="
        margin-top:30px;
        font-size:22px;
        ">
        Thank you for your support ❤️
        </p>

    </div>

    \`;
}

<\/script>

`;

        });

    </script>
