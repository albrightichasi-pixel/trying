<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Proposal</title>

    <style>
        :root {
            --bg: #f6f7f2;
            --ink: #202124;
            --muted: #687076;
            --green: #1f8f4d;
            --green-dark: #176c3b;
            --red: #c73d3d;
            --line: #dfe4dc;
            --card: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(31, 143, 77, 0.14), transparent 32rem),
                linear-gradient(135deg, #f8faf5 0%, var(--bg) 52%, #eef4f7 100%);
        }

        button,
        input {
            font: inherit;
        }

        .page {
            min-height: 100vh;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 28px 18px;
        }

        .page.is-active {
            display: flex;
        }

        .panel {
            width: min(100%, 680px);
            text-align: center;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 7vw, 4.8rem);
            line-height: 0.95;
            letter-spacing: 0;
        }

        h2 {
            margin: 0 0 18px;
            font-size: clamp(1.35rem, 4vw, 2rem);
        }

        p {
            margin: 14px auto 0;
            max-width: 560px;
            color: var(--muted);
            font-size: clamp(1rem, 3vw, 1.2rem);
            line-height: 1.55;
        }

        .main-image {
            width: min(100%, 560px);
            aspect-ratio: 16 / 9;
            object-fit: cover;
            border: 1px solid var(--line);
            border-radius: 8px;
            margin: 28px 0;
            box-shadow: 0 18px 42px rgba(32, 33, 36, 0.12);
        }

        .actions {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            min-height: 118px;
            position: relative;
        }

        .choice-btn {
            width: 98px;
            height: 98px;
            border: 0;
            border-radius: 50%;
            color: #fff;
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 12px 28px rgba(32, 33, 36, 0.18);
            transition: transform 180ms ease, background 180ms ease, left 180ms ease, top 180ms ease;
        }

        .choice-btn:focus-visible,
        .enter-btn:focus-visible,
        input:focus-visible {
            outline: 3px solid rgba(31, 143, 77, 0.28);
            outline-offset: 3px;
        }

        #yesBtn {
            background: var(--green);
        }

        #yesBtn:hover {
            background: var(--green-dark);
        }

        #noBtn {
            background: var(--red);
        }

        .form-card,
        .summary-card {
            width: min(100%, 520px);
            margin: 28px auto 0;
            padding: 24px;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 18px 42px rgba(32, 33, 36, 0.1);
            text-align: left;
        }

        label {
            display: block;
            margin: 16px 0 8px;
            color: #394047;
            font-size: 0.95rem;
            font-weight: 700;
        }

        input {
            width: 100%;
            min-height: 52px;
            padding: 12px 14px;
            border: 1px solid #cbd5cf;
            border-radius: 8px;
            color: var(--ink);
            background: #fff;
            font-size: 1rem;
        }

        .enter-btn {
            width: 100%;
            min-height: 54px;
            margin-top: 20px;
            border: 0;
            border-radius: 8px;
            background: var(--green);
            color: #fff;
            font-weight: 800;
            cursor: pointer;
            transition: background 180ms ease, transform 180ms ease;
        }

        .enter-btn:hover {
            background: var(--green-dark);
            transform: translateY(-1px);
        }

        .summary-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            padding: 15px 0;
            border-bottom: 1px solid var(--line);
            color: var(--muted);
        }

        .summary-row strong {
            color: var(--ink);
            text-align: right;
        }

        .summary-row.total {
            border-bottom: 0;
            color: var(--green-dark);
            font-size: 1.25rem;
            font-weight: 800;
        }

        .summary-row.total strong {
            color: var(--green-dark);
        }

        .note {
            margin-top: 18px;
            color: var(--muted);
            font-size: 0.95rem;
            text-align: center;
        }

        @media (max-width: 540px) {
            .page {
                padding: 22px 14px;
            }

            .actions {
                gap: 14px;
                min-height: 104px;
            }

            .choice-btn {
                width: 84px;
                height: 84px;
                font-size: 1rem;
            }

            .form-card,
            .summary-card {
                padding: 18px;
            }

            .summary-row {
                align-items: flex-start;
                flex-direction: column;
                gap: 5px;
            }

            .summary-row strong {
                text-align: left;
            }
        }
    </style>
</head>

<body>
    <main>
        <section class="page is-active" id="page1">
            <div class="panel">
                <h1>Please Help Me With Cash</h1>
                <p>Would you kindly lend me some money?</p>

                <img src="https://placehold.co/900x500/e8f3e9/1f8f4d?text=Please+Help+Me" alt="Please help me"
                    class="main-image">

                <div class="actions" id="buttonArea">
                    <button id="yesBtn" class="choice-btn" type="button">Yes</button>
                    <button id="noBtn" class="choice-btn" type="button">No</button>
                </div>
            </div>
        </section>

        <section class="page" id="page2">
            <div class="panel">
                <h1>Thank You</h1>
                <p>Thank you for your kindness. May God bless you abundantly. I promise I will repay.</p>

                <img src="https://placehold.co/900x500/f5efe6/7a4f25?text=Thank+You" alt="Thank you"
                    class="main-image">

                <form class="form-card" id="loanForm">
                    <h2>Enter Loan Details</h2>

                    <label for="loanAmount">Amount in KES</label>
                    <input type="number" id="loanAmount" min="1" step="1" placeholder="Example: 1000" required>

                    <label for="phoneNumber">Phone number</label>
                    <input type="tel" id="phoneNumber" placeholder="Example: 0712345678" required>

                    <button id="enterBtn" class="enter-btn" type="submit">Show Summary</button>
                </form>
            </div>
        </section>

        <section class="page" id="page3">
            <div class="panel">
                <h1>Loan Summary</h1>

                <div class="summary-card">
                    <div class="summary-row">
                        <span>You have lent</span>
                        <strong id="lentAmount"></strong>
                    </div>

                    <div class="summary-row">
                        <span>Interest, 10% per year</span>
                        <strong id="interestAmount"></strong>
                    </div>

                    <div class="summary-row">
                        <span>Phone number</span>
                        <strong id="phoneNumberDisplay"></strong>
                    </div>

                    <div class="summary-row total">
                        <span>Total repayment</span>
                        <strong id="totalAmount"></strong>
                    </div>
                </div>

                <p class="note">Thank you for your support.</p>
            </div>
        </section>
    </main>

    <script>
        const pages = {
            intro: document.getElementById("page1"),
            form: document.getElementById("page2"),
            summary: document.getElementById("page3")
        };

        const yesBtn = document.getElementById("yesBtn");
        const noBtn = document.getElementById("noBtn");
        const buttonArea = document.getElementById("buttonArea");
        const loanForm = document.getElementById("loanForm");
        const currency = new Intl.NumberFormat("en-KE", {
            style: "currency",
            currency: "KES",
            maximumFractionDigits: 0
        });

        let yesScale = 1;
        let noButtonIsLoose = false;

        function showPage(pageToShow) {
            Object.values(pages).forEach((page) => page.classList.remove("is-active"));
            pageToShow.classList.add("is-active");
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function moveNoButton() {
            const area = buttonArea.getBoundingClientRect();
            const button = noBtn.getBoundingClientRect();
            const maxX = Math.max(area.width - button.width, 0);
            const maxY = Math.max(area.height - button.height, 0);

            if (!noButtonIsLoose) {
                noBtn.style.position = "absolute";
                noButtonIsLoose = true;
            }

            noBtn.style.left = `${Math.random() * maxX}px`;
            noBtn.style.top = `${Math.random() * maxY}px`;

            yesScale = Math.min(yesScale + 0.12, 1.55);
            yesBtn.style.transform = `scale(${yesScale})`;
        }

        yesBtn.addEventListener("click", () => showPage(pages.form));
        noBtn.addEventListener("mouseenter", moveNoButton);
        noBtn.addEventListener("click", moveNoButton);

        loanForm.addEventListener("submit", (event) => {
            event.preventDefault();

            const amount = Number(document.getElementById("loanAmount").value);
            const phoneNumber = document.getElementById("phoneNumber").value.trim();
            const cleanedPhone = phoneNumber.replace(/\s+/g, "");

            if (!Number.isFinite(amount) || amount <= 0) {
                alert("Please enter a valid amount.");
                return;
            }

            if (!/^(?:\+?254|0)?7\d{8}$/.test(cleanedPhone)) {
                alert("Please enter a valid Kenyan phone number.");
                return;
            }

            const interest = amount * 0.10;
            const total = amount + interest;

            document.getElementById("lentAmount").textContent = currency.format(amount);
            document.getElementById("interestAmount").textContent = currency.format(interest);
            document.getElementById("phoneNumberDisplay").textContent = phoneNumber;
            document.getElementById("totalAmount").textContent = currency.format(total);

            showPage(pages.summary);
        });
    </script>
</body>

</html>
